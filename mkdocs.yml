site_name: bolerodata
site_url: https://liuhlab.github.io/bolerodata/
repo_url: https://github.com/liuhlab/bolerodata

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false

# sharing.md is a maintainer-only note (share/noshare model); keep it in the repo
# but do not publish it to the public docs site.
exclude_docs: |
  sharing.md

nav:
  - Home: index.md
  - Installation: install.md
  - Data setup & caching: data-setup.md
  - API reference: api.md
