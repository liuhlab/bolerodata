site_name: bolerodata
site_url: https://liuhlab.github.io/bolerodata/
repo_url: https://github.com/liuhlab/bolerodata

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: false

nav:
  - Home: index.md
  - Installation: install.md
  - Data setup & caching: data-setup.md
  - Sharing (maintainers): sharing.md
  - API reference: api.md
