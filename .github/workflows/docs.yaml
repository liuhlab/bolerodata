name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# allow the workflow to push the built site to the gh-pages branch
permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gh-deploy needs history to update the gh-pages branch

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: docs
          cache: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build & deploy to gh-pages
        run: pixi run docs-deploy
